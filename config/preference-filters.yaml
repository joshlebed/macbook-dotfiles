# Preference Filters
#
# Keys to strip from exported plists before committing them.
#
# Why this exists: macOS plists interleave real user settings with churn —
# launch counters, window frames, update timestamps, analytics identities.
# Byte-comparing raw plists therefore reports drift on every single export,
# which trains you to ignore the drift report, which is how genuine setting
# changes sat uncommitted for months (Thaw's SectionDividerStyle, Rectangle
# untouched since 2024).
#
# Stripping churn makes `export-preferences.sh --check` mean something: if it
# reports drift, a real setting actually changed.
#
# Patterns are fnmatch globs matched against top-level plist keys.
# The "*" section applies to every domain.
#
# CONSERVATIVE BY DEFAULT: only strip keys that are provably churn, identity,
# or window geometry. Do NOT strip one-time migration flags (e.g. Velja's
# SS_App_runOnce__migrate_*) — those are coupled to the on-disk data schema,
# and restoring data without its migration flag can make the app re-run a
# migration against already-migrated data.

# ============================================================================
# Applies to every domain
# ============================================================================
"*":
  # Window / panel geometry — differs per display, changes constantly
  - "NSWindow Frame *"
  - "NSSplitView Subview Frames *"
  - "NSStatusItem Preferred Position *"
  - "*NSNavPanelExpanded*"
  - "*NSNavLastRootDirectory"
  - "*NSOSPLastRootDirectory"
  - "*NSOSPShowsSidebar"

  # Sparkle updater bookkeeping (SUEnableAutomaticChecks / SUAutomaticallyUpdate
  # / SUSendProfileInfo / SUScheduledCheckInterval ARE real settings — kept)
  - "SULastCheckTime"
  - "SULastProfileSubmitDate"
  - "SUUpdateGroupIdentifier"
  - "SUUpdateRelaunchingMarker"
  - "SUHasLaunchedBefore"

  # Microsoft AppCenter analytics identity + device history. Syncing these
  # clones this machine's analytics identity onto the new one; the repo copy
  # currently records a Mac16,5 @1728x1117 while this machine is a Mac15,8.
  - "MSAppCenter*"

# ============================================================================
# Contexts
# ============================================================================
com.contextsformac.Contexts:
  - "CTAppInstanceId"          # per-install identity
  - "CTUsageCount*"            # usage counters
  - "CTInfoBundleVersionFirst" # version first installed

# ============================================================================
# Rectangle
# ============================================================================
com.knollsoft.Rectangle:
  - "lastVersion"

# ============================================================================
# Thaw
# ============================================================================
com.stonerl.Thaw:
  # Ephemeral menu-bar item IDs — dozens of per-session UUIDs
  # ("<UUID>:System Status Item Clone"), reordered on every launch.
  - "MenuBarItemManager.knownItemIdentifiers"
  - "MenuBarItemManager.pendingRelocations"
  - "MenuBarItemManager.pendingReturnDestinations"

# ============================================================================
# Velja
# ============================================================================
com.sindresorhus.Velja:
  - "SS_launchCount"
  - "SS_firstLaunchDate"
  - "SS_previousLaunchedVersion"
  - "SSApp_requestReview"
  - "history"                  # browsing history — noise, and privacy-sensitive
  - "userLog"
  - "rulesBackup"              # migration artifact, regenerated by the app
  # Security-scoped bookmarks encode this machine's paths/inodes and cannot
  # transfer to another Mac.
  - "*SandboxURLBookmark"
  - "userApplicationsDirectoryBookmark"

# ============================================================================
# Raycast
# ============================================================================
#
# NOTE: this domain is a poor sync target and is a candidate for removal from
# file-mappings.yaml entirely. Raycast's real configuration (hotkeys, aliases,
# extensions, quicklinks) lives in its encrypted SQLite store and is restored
# by Raycast Cloud Sync, which is active on this account. What remains in the
# plist is mostly analytics, onboarding flags and window geometry.
com.raycast.macos:
  - "raycastAnonymousId"       # analytics identity — must not be cloned
  - "amplitudePulseAnalyticsTracker_*"
  - "pulseEventsRepository_data"
  - "raycastInstallationDate"
  - "raycastFirstKnownAppVersion"
  - "raycast-updates-*"
  - "database_lastValid*"
  - "mainWindowPositionCache"
  - "commandScheduler_commandRuns"
  - "calculator_currenciesRefresh"
  - "permissions.folders.read:*"  # absolute /Users/<name>/... paths
  - "websocketServer_lastBEextConnection"
  - "*didMigrat*"
  - "*_didSendInstallationEvent"
  - "*_previousValue"
